name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支/PR 只保留最新一次在跑，省 runner
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check · Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri-build 的 build.rs 会校验 bundle.resources 路径存在；真实模型是 GB 级、不入库。
      # CI 只验证代码正确性（单测不加载模型，#[ignore] 集成测试才加载），放占位空文件过校验即可。
      - name: Stub model resources for tauri-build
        run: |
          mkdir -p src-tauri/models/sense-voice
          touch src-tauri/models/sense-voice/model.int8.onnx \
                src-tauri/models/sense-voice/tokens.txt \
                src-tauri/models/sense-voice/silero_vad.onnx

      - name: Install frontend deps
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Frontend build
        run: npm run build

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
