<!doctype html>
<!--
  Untype .dmg 安装窗口背景图的设计源。
  渲染：Chrome headless 截 #stage（1320×800 @2x）→ background@2x.png；
        再 `sips -z 400 660` 缩成 660×400 → background.png（= windowSize，决定布局）。
  布局（图标坐标）见 tauri.conf.json 的 bundle.macOS.dmg。
    Chrome headless 渲染命令：
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --headless=new \
      --disable-gpu --hide-scrollbars --force-device-scale-factor=1 \
      --screenshot=out.png --window-size=1320,800 file://.../background.src.html
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Untype dmg bg</title>
<style>
  :root{
    --canvas-top:   #161719;
    --canvas-bottom:#1b1c1f;
    --ink:          #F2F3F6;
    --ink-sub:      rgba(242,243,246,0.60);
    --accent:       #0A84FF;
    --hint:         rgba(242,243,246,0.40);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1320px; height:800px; background:var(--canvas-bottom);
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  #stage{
    position:relative; width:1320px; height:800px; overflow:hidden;
    background:linear-gradient(180deg, var(--canvas-top) 0%, var(--canvas-bottom) 62%);
  }
  #stage::before{
    content:""; position:absolute; left:50%; top:-6%;
    width:820px; height:560px; transform:translateX(-50%);
    background:radial-gradient(ellipse at center,
                rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.014) 38%, rgba(255,255,255,0) 70%);
    pointer-events:none;
  }
  /* 透白拖拽卡片（加重，使浅色模式下的 Finder 黑标签也可读） */
  .tray{
    position:absolute; left:90px; right:90px; top:300px; height:392px;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:40px;
    box-shadow:0 1px 0 rgba(255,255,255,0.07) inset;
  }
  .brand{ position:absolute; left:0; right:0; top:140px; text-align:center; z-index:1; }
  .wordmark{
    font-family:-apple-system,"SF Pro Display","Helvetica Neue",system-ui,sans-serif;
    font-size:72px; font-weight:500; letter-spacing:-0.022em; line-height:1; color:var(--ink);
  }
  .wordmark .dot{ color:var(--accent); }
  .tagline{
    margin-top:20px;
    font-family:-apple-system,"PingFang SC","SF Pro Text",system-ui,sans-serif;
    font-size:18px; font-weight:400; letter-spacing:0.16em; color:var(--ink-sub);
  }
  /* 中间「拖拽至」：双箭头(lucide chevrons-right) + 文字 */
  .drag-arrow{ position:absolute; left:50%; top:484px; transform:translate(-50%,-50%); z-index:2; line-height:0; }
  .drag-arrow svg{ width:84px; height:84px; }
  .drag-label{
    position:absolute; left:50%; top:556px; transform:translate(-50%,-50%); z-index:2;
    font-family:-apple-system,"PingFang SC","SF Pro Text",system-ui,sans-serif;
    font-size:18px; font-weight:400; letter-spacing:0.16em; color:var(--hint); white-space:nowrap;
  }
</style>
</head>
<body>
  <div id="stage">
    <div class="tray"></div>
    <div class="brand">
      <div class="wordmark">Untype<span class="dot">.</span></div>
      <div class="tagline">说话，不用打字</div>
    </div>
    <div class="drag-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(242,243,246,0.34)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/>
      </svg>
    </div>
    <div class="drag-label">拖拽至</div>
  </div>
</body>
</html>
